<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4ade80" />
            <stop offset="50%" stop-color="#22c55e" />
            <stop offset="100%" stop-color="#15803d" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background Dark Luxury -->
    <rect width="64" height="64" rx="14" fill="#09090b" />
    
    <!-- Node grid / Hexagon -->
    <polygon points="32,10 52,21 52,43 32,54 12,43 12,21" fill="none" stroke="rgba(34,197,94,0.2)" stroke-width="2" />
    
    <!-- Tech Abstract 'S' for Simecab -->
    <path d="M 40 24 L 28 24 A 4 4 0 0 0 24 28 A 4 4 0 0 0 28 32 L 36 32 A 4 4 0 0 1 40 36 A 4 4 0 0 1 36 40 L 24 40" 
          fill="none" stroke="url(#grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    
    <!-- Terminals/Nodes -->
    <circle cx="40" cy="24" r="3.5" fill="#86efac" filter="url(#glow)" />
    <circle cx="24" cy="40" r="3.5" fill="#86efac" filter="url(#glow)" />
</svg>
